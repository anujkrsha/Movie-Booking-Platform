spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Email (SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

  # Thymeleaf — disable web auto-config; use only for template rendering
  thymeleaf:
    check-template-location: true

server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET:booking-platform-secret-key-change-in-production-min-32-chars}
  expiration: 86400000

notification:
  from-email: ${FROM_EMAIL:noreply@booking.com}
  from-name: ${FROM_NAME:Booking Platform}
  retry:
    max-attempts: 3
    delay-ms: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.booking: DEBUG
