spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${DB_USERNAME:booking}
    password: ${DB_PASSWORD:booking}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: UserServiceHikari

  jpa:
    hibernate:
      ddl-auto: validate        # schema managed by Flyway/Liquibase in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

server:
  port: 8081
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── JWT / RS256 ──────────────────────────────────────────────────────────────
# Generate keys:
#   openssl genrsa -out rsa.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform DER -in rsa.pem -nocrypt | base64 -w0
#   openssl rsa -in rsa.pem -pubout -outform DER | base64 -w0
jwt:
  private-key-base64: ${JWT_PRIVATE_KEY}
  public-key-base64:  ${JWT_PUBLIC_KEY}
  expiration: 900000            # 15 minutes (access token)
  refresh-expiration: 604800000 # 7 days     (refresh token)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.booking: DEBUG
    org.springframework.security: INFO
