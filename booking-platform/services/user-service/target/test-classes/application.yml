spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      # Tests use @MockBean for RedisTemplate — no real Redis needed
      host: localhost
      port: 6379

# Test RSA keypair (2048-bit, generated for tests only — never use in production)
# To regenerate:
#   openssl genrsa -out /tmp/test.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform DER -in /tmp/test.pem -nocrypt | base64 -w0
#   openssl rsa -in /tmp/test.pem -pubout -outform DER | base64 -w0
jwt:
  private-key-base64: ${TEST_JWT_PRIVATE_KEY:}
  public-key-base64:  ${TEST_JWT_PUBLIC_KEY:}
  expiration: 900000
  refresh-expiration: 604800000
