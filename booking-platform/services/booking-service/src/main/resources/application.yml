spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: booking-service
    producer:
      # Matches KafkaProducerConfig; declared here for Spring Boot health indicator
      acks: all

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET:booking-platform-secret-key-change-in-production-min-32-chars}
  expiration: 86400000

# Internal service URLs (replace with service-discovery URLs in k8s)
services:
  show-service:
    base-url: ${SHOW_SERVICE_URL:http://localhost:8084}
  payment-service:
    base-url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
  offer-service:
    base-url: ${OFFER_SERVICE_URL:http://localhost:8087}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.booking: DEBUG
